version: '3.8'

services:
  supreme-cal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: supreme-cal
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/supreme-cal.sqlite
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    volumes:
      - supreme-cal-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  supreme-cal-data:
    driver: local
